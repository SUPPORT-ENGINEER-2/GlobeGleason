<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Globe vs Gleason</title>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: #000; color: #eee; font-family: sans-serif; overflow: hidden; }
        #top { display: flex; flex: 1; min-height: 0; }
        #globe-container, #map-container { flex: 1; position: relative; border-right: 1px solid #333; height: 100%; background: #111; overflow: hidden; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 4px; z-index: 1000; font-size: 11px; border: 1px solid #444; pointer-events: none; }
        .route-info { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 5px 14px; border-radius: 4px; z-index: 1000; font-size: 12px; border: 1px solid #444; pointer-events: none; white-space: nowrap; text-align: center; display: none; }
        #routes-panel { background: #1a1a1a; border-top: 1px solid #444; padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 48px; }
        #routes-panel .panel-label { font-size: 11px; color: #888; white-space: nowrap; }
        #route-buttons { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
        .route-btn { display: inline-flex; align-items: center; gap: 4px; background: #333; color: white; border: 1px solid #555; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .route-btn:hover { background: #444; }
        .route-btn .del { color: #f66; font-size: 14px; line-height: 1; cursor: pointer; margin-left: 2px; }
        .route-btn .del:hover { color: #f00; }
        #add-route { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        #add-route input { background: #222; border: 1px solid #555; color: #eee; padding: 4px 6px; border-radius: 3px; font-size: 12px; width: 140px; }
        #add-route input::placeholder { color: #666; }
        #add-route button { background: #2a4a2a; color: #8f8; border: 1px solid #4a7a4a; padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        #add-route button:hover { background: #3a6a3a; }
    </style>
</head>
<body>

    <div id="top">
        <div id="globe-container"><div class="label">3D GLOBE</div><div id="globe-info" class="route-info"></div></div>
        <div id="map-container"><div class="label">GLEASON (AE PROJECTION)</div><div id="map-info" class="route-info"></div></div>
    </div>
    <div id="routes-panel">
        <span class="panel-label">ROUTES</span>
        <div id="route-buttons"></div>
        <div id="add-route">
            <input id="route-city1" placeholder="From (e.g. London)" />
            <input id="route-city2" placeholder="To (e.g. Tokyo)" />
            <button onclick="addRoute()">+ Add</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
